<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#1e1e1e;
        font-family:Arial, sans-serif;
    }

    .calculadora{
        background:#2c2c2c;
        padding:20px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.5);
        width:320px;
    }

    #pantalla{
        width:100%;
        height:60px;
        margin-bottom:15px;
        font-size:2rem;
        text-align:right;
        padding:10px;
        border:none;
        border-radius:10px;
        background:#111;
        color:white;
        box-sizing:border-box;
    }

    .botones{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:60px;
        border:none;
        border-radius:10px;
        font-size:1.3rem;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
    }

    .numero{
        background:#3d3d3d;
        color:white;
    }

    .operador{
        background:#ff9500;
        color:white;
    }

    .igual{
        background:#34c759;
        color:white;
        grid-column:span 2;
    }

    .borrar{
        background:#ff3b30;
        color:white;
    }
</style>
</head>

<body>

<div class="calculadora">
    <input type="text" id="pantalla" disabled>

    <div class="botones">
        <button class="borrar" onclick="limpiar()">C</button>
        <button class="operador" onclick="agregar('/')">÷</button>
        <button class="operador" onclick="agregar('*')">×</button>
        <button class="operador" onclick="agregar('-')">−</button>

        <button class="numero" onclick="agregar('7')">7</button>
        <button class="numero" onclick="agregar('8')">8</button>
        <button class="numero" onclick="agregar('9')">9</button>
        <button class="operador" onclick="agregar('+')">+</button>

        <button class="numero" onclick="agregar('4')">4</button>
        <button class="numero" onclick="agregar('5')">5</button>
        <button class="numero" onclick="agregar('6')">6</button>
        <button class="numero" onclick="agregar('.')">.</button>

        <button class="numero" onclick="agregar('1')">1</button>
        <button class="numero" onclick="agregar('2')">2</button>
        <button class="numero" onclick="agregar('3')">3</button>
        <button class="numero" onclick="agregar('0')">0</button>

        <button class="igual" onclick="calcular()">=</button>
    </div>
</div>

<script>
    const pantalla = document.getElementById("pantalla");

    function agregar(valor){
        pantalla.value += valor;
    }

    function limpiar(){
        pantalla.value = "";
    }

    function calcular(){
        try{
            pantalla.value = eval(pantalla.value);
        } catch(error){
            pantalla.value = "Error";
        }
    }
</script>

</body>
</html>
